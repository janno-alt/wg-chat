# kine-chat – lokaler/EU-Container-Stack.
# Schnellstart:  cp .env.example .env  &&  docker compose up -d --build
# Seed danach:   docker compose run --rm backend npm run seed
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kine
      POSTGRES_PASSWORD: kine
      POSTGRES_DB: kinechat
    ports:
      # Host-Port konfigurierbar – Default 5432 kollidiert ggf. mit einer
      # bereits laufenden Postgres (z.B. eurer CRM-DB). Dann POSTGRES_HOST_PORT setzen.
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kine -d kinechat']
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8787}
      DATABASE_URL: postgres://kine:kine@postgres:5432/kinechat
      LLM_PROVIDER: mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_CHAT_MODEL: ${MISTRAL_CHAT_MODEL:-mistral-small-latest}
      MISTRAL_EMBED_MODEL: ${MISTRAL_EMBED_MODEL:-mistral-embed}
      ALLOW_ALL_ORIGINS: ${ALLOW_ALL_ORIGINS:-true}
    ports:
      - '8787:8787'
    depends_on:
      postgres:
        condition: service_healthy
