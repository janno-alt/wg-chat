name: Build & Deploy (Mittwald)

# Deploy bei Versions-Tag (v1.2.3) oder manuell.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Push nach GHCR
    environment:
      name: production
      url: ${{ vars.PUBLIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      # GHCR-Imagename kleinschreiben (GHCR verlangt lowercase owner)
      - id: vars
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "image=ghcr.io/${OWNER,,}/wg-chat-backend" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push (Backend inkl. Widget)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Deploy nur, wenn Mittwald konfiguriert ist. Beim ersten Lauf (ohne
      # MITTWALD_STACK_ID) wird NUR das Image gebaut/gepusht – damit lässt sich
      # das Henne-Ei-Problem lösen: erst Image erzeugen, dann den Stack anlegen.
      - name: Deploy Stack nach Mittwald
        if: ${{ vars.MITTWALD_STACK_ID != '' }}
        uses: mittwald/deploy-container-action@v1
        env:
          # Diese Werte werden in deploy/stack.yaml als {{ .Env.X }} aufgelöst.
          IMAGE_TAG: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # SMTP optional – leer lassen, wenn keine E-Mail-Benachrichtigung gewünscht
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          api_token: ${{ secrets.MITTWALD_API_TOKEN }}
          stack_id: ${{ vars.MITTWALD_STACK_ID }}
          stack_file: ${{ github.workspace }}/deploy/stack.yaml
